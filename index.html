<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clear Capital • Approved</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #0a1729; --emerald: #00d4aa; }
        body { font-family: 'Inter', system-ui, sans-serif; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }
        .merchant-card { box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.15); }
    </style>
</head>
<body class="bg-slate-50">

<div id="builder-mode" class="min-h-screen p-8">
    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-emerald-600 text-white rounded-3xl flex items-center justify-center text-4xl font-bold logo-font">C</div>
                <div class="text-4xl font-semibold logo-font">Clear Capital</div>
            </div>
            <div class="text-emerald-600 font-medium">Internal Deal Studio</div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            <!-- BUILDER -->
            <div class="lg:col-span-5 bg-white rounded-3xl p-10">
                <h1 class="text-3xl font-semibold logo-font mb-8">Deal Builder</h1>
                
                <div class="space-y-8">
                    <input id="bizName" value="Sunrise Grill & Bar" oninput="update()" 
                           class="w-full px-6 py-5 text-xl border border-slate-200 rounded-2xl focus:border-emerald-500">

                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <label class="text-sm text-slate-500">Max Approval</label>
                            <input id="maxAmt" type="number" value="100000" oninput="update()" 
                                   class="w-full px-6 py-5 text-xl border border-slate-200 rounded-2xl">
                        </div>
                        <div>
                            <label class="text-sm text-slate-500">Factor Rate</label>
                            <input id="factorRate" type="number" value="1.18" step="0.01" oninput="update()" 
                                   class="w-full px-6 py-5 text-xl border border-slate-200 rounded-2xl">
                        </div>
                    </div>

                    <div>
                        <label class="text-sm text-slate-500">Term (months)</label>
                        <input id="term" type="number" value="12" oninput="update()" 
                               class="w-full px-6 py-5 text-xl border border-slate-200 rounded-2xl">
                    </div>

                    <button onclick="generatePrivateLink()" 
                            class="w-full py-7 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold text-xl rounded-3xl">
                        Generate Private Merchant Link
                    </button>
                </div>
            </div>

            <!-- PREVIEW -->
            <div class="lg:col-span-7">
                <div id="preview" class="bg-white rounded-3xl p-10 merchant-card"></div>
            </div>
        </div>
    </div>
</div>

<script>
function update() {
    const biz = document.getElementById('bizName').value || "Business";
    const max = parseInt(document.getElementById('maxAmt').value) || 100000;
    const factor = parseFloat(document.getElementById('factorRate').value) || 1.18;
    const term = parseInt(document.getElementById('term').value) || 12;
    const amt = Math.round(max * 0.75);

    const total = Math.round(amt * factor);
    const dailyPayment = Math.round(total / (term * 22));

    document.getElementById('preview').innerHTML = `
        <div class="flex justify-between items-start">
            <div>
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 bg-emerald-600 text-white rounded-3xl flex items-center justify-center text-4xl font-bold logo-font">C</div>
                    <div>
                        <div class="text-2xl font-semibold logo-font">Clear Capital</div>
                        <div class="text-emerald-600">Pre-Approved</div>
                    </div>
                </div>
                <div class="mt-10 text-5xl font-bold text-slate-900">${biz}</div>
            </div>
            <div class="bg-emerald-100 text-emerald-700 px-8 py-3 rounded-3xl font-semibold">APPROVED</div>
        </div>

        <div class="mt-12 text-7xl font-bold logo-font text-slate-900">$${amt.toLocaleString()}</div>
        <div class="text-slate-500 text-xl">75% of Max Approval</div>

        <div class="mt-12 grid grid-cols-3 gap-8">
            <div class="text-center">
                <div class="text-5xl font-semibold">$${dailyPayment}</div>
                <div class="text-sm text-slate-500 mt-1">DAILY PAYMENT</div>
            </div>
            <div class="text-center">
                <div class="text-5xl font-semibold">$${total.toLocaleString()}</div>
                <div class="text-sm text-slate-500 mt-1">TOTAL PAYBACK</div>
            </div>
            <div class="text-center">
                <div class="text-5xl font-semibold">${factor.toFixed(2)}×</div>
                <div class="text-sm text-slate-500 mt-1">FACTOR RATE</div>
            </div>
        </div>
    `;
}

function generatePrivateLink() {
    const params = new URLSearchParams({
        merchant: 'true',
        biz: document.getElementById('bizName').value || 'Business',
        max: document.getElementById('maxAmt').value,
        factor: document.getElementById('factorRate').value,
        term: document.getElementById('term').value
    });
    
    const link = `${window.location.origin}${window.location.pathname}?${params.toString()}`;
    navigator.clipboard.writeText(link);
    alert(`✅ Private Merchant Link Copied!\n\n${link}`);
}

update();
</script>
</body>
</html>
