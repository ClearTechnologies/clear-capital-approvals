<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clear Capital • Approved</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #0a1729; --emerald: #00d4aa; }
        body { font-family: 'Inter', system-ui, sans-serif; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>
<body class="bg-slate-50">

<!-- BUILDER - ONLY YOU SEE THIS -->
<div id="builder-mode">
    <div class="max-w-7xl mx-auto p-8">
        <div class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-[#0a1729] text-white rounded-3xl flex items-center justify-center text-4xl font-bold logo-font">C</div>
                <div class="text-4xl font-semibold logo-font">Clear Capital</div>
            </div>
            <div class="text-emerald-600 font-medium">Internal Deal Studio</div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 bg-white rounded-3xl p-8 space-y-8">
                <h1 class="text-3xl font-semibold logo-font">Deal Builder</h1>
                
                <input id="bizName" value="Sunrise Grill & Bar" oninput="update()" class="w-full px-6 py-5 text-xl border border-slate-200 rounded-2xl">

                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm text-slate-500 mb-2">Max Approval</label>
                        <input id="maxAmt" type="number" value="100000" oninput="update()" class="w-full px-6 py-5 text-xl border border-slate-200 rounded-2xl">
                    </div>
                    <div>
                        <label class="block text-sm text-slate-500 mb-2">Factor Rate</label>
                        <input id="factorRate" type="number" value="1.18" step="0.01" oninput="update()" class="w-full px-6 py-5 text-xl border border-slate-200 rounded-2xl">
                    </div>
                </div>

                <div>
                    <label class="block text-sm text-slate-500 mb-2">Max Term (months)</label>
                    <input id="maxTerm" type="number" value="12" oninput="update()" class="w-full px-6 py-5 text-xl border border-slate-200 rounded-2xl">
                </div>

                <button onclick="generatePrivateLink()" class="w-full py-7 bg-[#0a1729] text-white font-semibold text-xl rounded-3xl">
                    Generate Private Merchant Link
                </button>
            </div>

            <div class="lg:col-span-8">
                <div id="preview" class="bg-white rounded-3xl p-10 text-center text-slate-400 py-32">Live Preview</div>
            </div>
        </div>
    </div>
</div>

<!-- MERCHANT VIEW - WHAT THE MERCHANT SEES -->
<div id="merchant-only-view" class="hidden min-h-screen bg-slate-50 flex items-center justify-center p-6">
    <div class="max-w-2xl w-full bg-white rounded-3xl p-10 shadow-2xl" id="merchant-card"></div>
</div>

<script>
function isMerchantMode() {
    return window.location.search.includes('merchant=true');
}

function generatePrivateLink() {
    const params = new URLSearchParams({
        merchant: 'true',
        biz: document.getElementById('bizName').value || 'Business',
        max: document.getElementById('maxAmt').value,
        factor: document.getElementById('factorRate').value,
        maxTerm: document.getElementById('maxTerm').value
    });
    const link = `${window.location.origin}${window.location.pathname}?${params.toString()}`;
    navigator.clipboard.writeText(link);
    alert('✅ Private Merchant Link Copied!\n\nOpen this link in a new tab to see what the merchant sees.');
}

function update() {
    if (isMerchantMode()) return;
    document.getElementById('preview').innerHTML = `<div class="text-center text-slate-400 py-32">Builder Preview - Updates as you type</div>`;
}

function renderMerchantView() {
    const p = new URLSearchParams(window.location.search);
    const biz = p.get('biz') || "Business";
    const max = parseInt(p.get('max')) || 100000;
    const factor = parseFloat(p.get('factor')) || 1.18;
    const maxTerm = parseInt(p.get('maxTerm')) || 12;

    const amt = Math.round(max * 0.75);
    const total = Math.round(amt * factor);
    const daily = Math.round(total / (maxTerm * 22));

    document.getElementById('merchant-card').innerHTML = `
        <div class="flex justify-between items-start mb-8">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-[#0a1729] text-white rounded-3xl flex items-center justify-center text-4xl font-bold logo-font">C</div>
                <div class="text-3xl font-semibold logo-font">Clear Capital</div>
            </div>
            <div class="bg-emerald-100 text-emerald-700 px-6 py-2 rounded-3xl font-semibold">PRE-APPROVED</div>
        </div>

        <div class="text-5xl font-semibold">${biz}</div>

        <div class="mt-10">
            <label class="block text-sm text-slate-500 mb-2">Funding Amount</label>
            <input id="amtInput" type="number" value="${amt}" oninput="updateMerchantCalc()" 
                   class="w-full px-8 py-8 text-6xl font-bold border border-slate-200 rounded-3xl text-center">
            <input type="range" id="amtSlider" min="5000" max="${max}" value="${amt}" step="1" 
                   oninput="document.getElementById('amtInput').value = this.value; updateMerchantCalc()" 
                   class="w-full mt-6 accent-[#0a1729]">
        </div>

        <div class="mt-12 grid grid-cols-3 gap-8 text-center">
            <div><div class="text-5xl font-semibold">$${daily}</div><div class="text-xs text-slate-500">DAILY</div></div>
            <div><div class="text-5xl font-semibold">$${total.toLocaleString()}</div><div class="text-xs text-slate-500">TOTAL PAYBACK</div></div>
            <div><div class="text-5xl font-semibold">${factor.toFixed(2)}×</div><div class="text-xs text-slate-500">FACTOR RATE</div></div>
        </div>

        <div class="mt-16 flex gap-4">
            <button onclick="sendInterest()" class="flex-1 py-8 bg-[#0a1729] text-white font-semibold text-2xl rounded-3xl">I'm Interested →</button>
            <button onclick="sendChangeRequest()" class="flex-1 py-8 border-2 border-slate-300 font-semibold text-2xl rounded-3xl">Request Change</button>
        </div>
    `;
}

function updateMerchantCalc() {
    // Live calculation can be expanded later
}

function sendInterest() { alert("Thank you! A Clear Capital specialist will contact you shortly."); }
function sendChangeRequest() { alert("Change request received."); }

// Initialize - THIS IS THE KEY FIX
if (isMerchantMode()) {
    document.getElementById('builder-mode').classList.add('hidden');
    renderMerchantView();
} else {
    update();
}
</script>
</body>
</html>
