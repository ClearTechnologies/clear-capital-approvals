<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clear Capital • Approved</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #0a1729; --emerald: #00d4aa; }
        body { font-family: 'Inter', system-ui, sans-serif; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">

<div class="max-w-2xl w-full bg-white rounded-3xl shadow-2xl p-10">

    <div class="flex justify-between items-center mb-10">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 bg-[#0a1729] text-white rounded-3xl flex items-center justify-center text-4xl font-bold logo-font">C</div>
            <div class="text-3xl font-semibold logo-font">Clear Capital</div>
        </div>
        <div class="bg-emerald-100 text-emerald-700 px-6 py-2 rounded-3xl font-semibold">PRE-APPROVED</div>
    </div>

    <div id="bizNameDisplay" class="text-4xl font-semibold text-[#0a1729]">Sunrise Grill & Bar</div>

    <!-- Funding Amount -->
    <div class="mt-10">
        <label class="block text-sm text-slate-500 mb-3">Funding Amount</label>
        <input id="amtInput" type="number" value="75000" 
               oninput="updateCalc()" 
               onblur="formatAmount(this)"
               class="w-full px-8 py-8 text-6xl font-bold border border-slate-200 rounded-3xl text-center">
        <input type="range" id="amtSlider" min="5000" max="100000" value="75000" step="1" 
               oninput="document.getElementById('amtInput').value = this.value; updateCalc()" 
               class="w-full mt-6 accent-[#0a1729]">
    </div>

    <!-- Main Calculations -->
    <div class="mt-12 grid grid-cols-3 gap-8 text-center" id="mainCalc"></div>

    <!-- Early Payoff -->
    <div class="mt-12 bg-emerald-50 border border-emerald-100 rounded-3xl p-8">
        <div class="font-semibold text-emerald-800 mb-6">Early Payoff Options</div>
        <div class="grid grid-cols-3 gap-6 text-center" id="earlyPayoff"></div>
    </div>

    <div class="mt-16 flex gap-4">
        <button onclick="sendInterest()" class="flex-1 py-8 bg-[#0a1729] text-white font-semibold text-2xl rounded-3xl">I'm Interested →</button>
        <button onclick="sendChangeRequest()" class="flex-1 py-8 border-2 border-slate-300 font-semibold text-2xl rounded-3xl">Request Change</button>
    </div>

</div>

<script>
function fmt(n) {
    return '$' + Math.round(n).toLocaleString('en-US');
}

function formatAmount(input) {
    const val = parseInt(input.value) || 5000;
    const max = parseInt(new URLSearchParams(window.location.search).get('max')) || 100000;
    let cleanVal = Math.min(Math.max(val, 5000), max);
    input.value = cleanVal;
    updateCalc();
}

function updateCalc() {
    let amt = parseInt(document.getElementById('amtInput').value) || 5000;
    const factor = 1.18;
    const term = 12;

    const total = Math.round(amt * factor);
    const daily = Math.round(total / (term * 22));

    document.getElementById('mainCalc').innerHTML = `
        <div><div class="text-5xl font-semibold">${fmt(daily)}</div><div class="text-xs text-slate-500">DAILY PAYMENT</div></div>
        <div><div class="text-5xl font-semibold">${fmt(total)}</div><div class="text-xs text-slate-500">TOTAL PAYBACK</div></div>
        <div><div class="text-5xl font-semibold">${factor.toFixed(2)}×</div><div class="text-xs text-slate-500">FACTOR RATE</div></div>
    `;

    const remaining = total - amt;
    const savings = Math.round(remaining * 0.5);

    document.getElementById('earlyPayoff').innerHTML = `
        <div class="bg-white rounded-2xl p-5">
            <div class="text-emerald-600 font-semibold">30 Days</div>
            <div class="text-3xl font-bold text-emerald-700">${fmt(total - savings)}</div>
            <div class="text-xs text-slate-500">1.03 Factor</div>
        </div>
        <div class="bg-white rounded-2xl p-5">
            <div class="text-emerald-600 font-semibold">60 Days</div>
            <div class="text-3xl font-bold text-emerald-700">${fmt(total - Math.round(remaining * 0.3))}</div>
            <div class="text-xs text-slate-500">1.07 Factor</div>
        </div>
        <div class="bg-white rounded-2xl p-5">
            <div class="text-emerald-600 font-semibold">90 Days</div>
            <div class="text-3xl font-bold text-emerald-700">${fmt(total - Math.round(remaining * 0.1))}</div>
            <div class="text-xs text-slate-500">1.10 Factor</div>
        </div>
    `;
}

function sendInterest() { alert("Thank you! A Clear Capital specialist will contact you shortly."); }
function sendChangeRequest() { alert("Change request received."); }

// Initial load
updateCalc();
</script>
</body>
</html>
