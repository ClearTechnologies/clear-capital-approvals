<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clear Capital • Approved</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #0a1729; --emerald: #00d4aa; }
        body { font-family: 'Inter', system-ui, sans-serif; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }
        .merchant-card { box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.15); }
    </style>
</head>
<body class="bg-slate-50">

<!-- BUILDER - YOU SEE THIS -->
<div id="builder-mode">
    <div class="max-w-7xl mx-auto p-8">
        <div class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-emerald-600 text-white rounded-3xl flex items-center justify-center text-4xl font-bold logo-font">C</div>
                <div class="text-4xl font-semibold logo-font">Clear Capital</div>
            </div>
            <div class="text-emerald-600 font-medium">Internal Deal Studio</div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Builder Controls -->
            <div class="lg:col-span-4 bg-white rounded-3xl p-8 space-y-8">
                <h1 class="text-3xl font-semibold logo-font">Deal Builder</h1>
                
                <input id="bizName" value="Sunrise Grill & Bar" oninput="update()" class="w-full px-6 py-5 text-xl border border-slate-200 rounded-2xl focus:border-emerald-500">

                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="text-sm text-slate-500">Max Approval Amount</label>
                        <input id="maxAmt" type="number" value="100000" oninput="update()" class="w-full px-6 py-5 text-xl border border-slate-200 rounded-2xl">
                    </div>
                    <div>
                        <label class="text-sm text-slate-500">Factor Rate</label>
                        <input id="factorRate" type="number" value="1.18" step="0.01" oninput="update()" class="w-full px-6 py-5 text-xl border border-slate-200 rounded-2xl">
                    </div>
                </div>

                <div>
                    <label class="text-sm text-slate-500">Term (months)</label>
                    <input id="term" type="number" value="12" oninput="update()" class="w-full px-6 py-5 text-xl border border-slate-200 rounded-2xl">
                </div>

                <button onclick="generatePrivateLink()" 
                        class="w-full py-7 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold text-xl rounded-3xl">
                    Generate Private Merchant Link
                </button>
            </div>

            <!-- Live Preview -->
            <div class="lg:col-span-8">
                <div id="preview" class="merchant-card bg-white rounded-3xl p-10"></div>
            </div>
        </div>
    </div>
</div>

<!-- MERCHANT VIEW -->
<div id="merchant-only-view" class="hidden min-h-screen bg-slate-50 flex items-center justify-center p-6">
    <div class="max-w-xl w-full">
        <div id="merchant-card" class="merchant-card bg-white rounded-3xl p-10"></div>
    </div>
</div>

<script>
function isMerchantMode() {
    return new URLSearchParams(window.location.search).has('merchant');
}

function generatePrivateLink() {
    const params = new URLSearchParams({
        merchant: 'true',
        biz: document.getElementById('bizName').value,
        max: document.getElementById('maxAmt').value,
        factor: document.getElementById('factorRate').value,
        term: document.getElementById('term').value
    });
    const link = `${window.location.origin}${window.location.pathname}?${params.toString()}`;
    navigator.clipboard.writeText(link);
    alert('✅ Private Merchant Link Copied!\n\nSend this link to the merchant.');
}

function update() {
    if (isMerchantMode()) return;

    const biz = document.getElementById('bizName').value || "Business";
    const max = parseInt(document.getElementById('maxAmt').value) || 100000;
    const factor = parseFloat(document.getElementById('factorRate').value) || 1.18;
    const term = parseInt(document.getElementById('term').value) || 12;
    const amt = Math.round(max * 0.75);

    const total = Math.round(amt * factor);
    const daily = Math.round(total / (term * 22));

    document.getElementById('preview').innerHTML = `
        <div class="flex justify-between items-start mb-8">
            <div>
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 bg-emerald-600 text-white rounded-3xl flex items-center justify-center text-4xl font-bold logo-font">C</div>
                    <div class="text-3xl font-semibold logo-font">Clear Capital</div>
                </div>
                <div class="mt-8 text-4xl font-semibold">${biz}</div>
            </div>
            <div class="bg-emerald-100 text-emerald-700 px-8 py-3 rounded-3xl font-semibold">PRE-APPROVED</div>
        </div>

        <div class="text-7xl font-bold logo-font text-slate-900">$${amt.toLocaleString()}</div>
        <div class="text-slate-500">75% of Max • Adjustable by merchant</div>

        <input type="range" min="5000" max="${max}" value="${amt}" step="1000" 
               class="w-full mt-8 accent-emerald-500">

        <div class="grid grid-cols-3 gap-8 mt-12">
            <div class="text-center">
                <div class="text-5xl font-semibold">$${daily}</div>
                <div class="text-xs text-slate-500 mt-2">DAILY PAYMENT</div>
            </div>
            <div class="text-center">
                <div class="text-5xl font-semibold">$${total.toLocaleString()}</div>
                <div class="text-xs text-slate-500 mt-2">TOTAL PAYBACK</div>
            </div>
            <div class="text-center">
                <div class="text-5xl font-semibold">${factor.toFixed(2)}×</div>
                <div class="text-xs text-slate-500 mt-2">FACTOR RATE</div>
            </div>
        </div>
    `;
}

function renderMerchantView() {
    const p = new URLSearchParams(window.location.search);
    const biz = p.get('biz') || "Your Business";
    const max = parseInt(p.get('max')) || 100000;
    const factor = parseFloat(p.get('factor')) || 1.18;
    const term = parseInt(p.get('term')) || 12;
    const amt = Math.round(max * 0.75);
    const total = Math.round(amt * factor);
    const daily = Math.round(total / (term * 22));

    document.getElementById('merchant-card').innerHTML = `
        <div class="flex justify-between items-start">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-emerald-600 text-white rounded-3xl flex items-center justify-center text-4xl font-bold logo-font">C</div>
                <div class="text-3xl font-semibold logo-font">Clear Capital</div>
            </div>
            <div class="bg-emerald-100 text-emerald-700 px-8 py-3 rounded-3xl font-semibold">PRE-APPROVED</div>
        </div>

        <div class="text-6xl font-bold logo-font text-slate-900 mt-12">$${amt.toLocaleString()}</div>
        <div class="text-slate-500">Approved Amount • Move slider below</div>

        <input type="range" min="5000" max="${max}" value="${amt}" step="1000" 
               class="w-full mt-10 accent-emerald-500">

        <div class="grid grid-cols-3 gap-8 mt-16">
            <div class="text-center">
                <div class="text-5xl font-semibold">$${daily}</div>
                <div class="text-xs text-slate-500">DAILY PAYMENT</div>
            </div>
            <div class="text-center">
                <div class="text-5xl font-semibold">$${total.toLocaleString()}</div>
                <div class="text-xs text-slate-500">TOTAL PAYBACK</div>
            </div>
            <div class="text-center">
                <div class="text-5xl font-semibold">${factor.toFixed(2)}×</div>
                <div class="text-xs text-slate-500">FACTOR RATE</div>
            </div>
        </div>

        <div class="mt-16 flex gap-4">
            <button onclick="sendInterest()" class="flex-1 py-8 bg-emerald-600 text-white text-2xl font-semibold rounded-3xl">I'm Interested →</button>
            <button onclick="sendChangeRequest()" class="flex-1 py-8 border-2 border-slate-300 text-2xl font-semibold rounded-3xl">Request Change</button>
        </div>
    `;
}

function sendInterest() {
    alert("Thank you! A Clear Capital specialist will contact you shortly.");
}

function sendChangeRequest() {
    alert("Change request sent. We will get back to you soon.");
}

// Initialize
if (isMerchantMode()) {
    document.getElementById('builder-mode').classList.add('hidden');
    renderMerchantView();
} else {
    update();
}
</script>
</body>
</html>
