<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clear Capital • Deal Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #0a1729; --emerald: #00d4aa; }
        body { font-family: 'Inter', system-ui, sans-serif; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }
        .merchant-card { box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.15); }
    </style>
</head>
<body class="bg-slate-50">

<div class="max-w-screen-2xl mx-auto p-8">
    <div class="flex justify-between items-center mb-8">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-emerald-600 text-white rounded-3xl flex items-center justify-center text-4xl font-bold logo-font">C</div>
            <div class="text-4xl font-semibold logo-font">Clear Capital</div>
        </div>
        <div class="text-emerald-600 font-medium">Internal Deal Studio</div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
        <!-- BUILDER -->
        <div class="lg:col-span-4 bg-white rounded-3xl p-8 space-y-8">
            <h1 class="text-3xl font-semibold logo-font">Deal Builder</h1>

            <div>
                <label class="block text-sm text-slate-500 mb-2">Business Name</label>
                <input id="bizName" value="Sunrise Grill & Bar" oninput="update()" class="w-full px-6 py-5 border border-slate-200 rounded-2xl text-lg">
            </div>

            <div class="grid grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm text-slate-500 mb-2">Max Approval</label>
                    <input id="maxAmt" type="number" value="100000" oninput="update()" class="w-full px-6 py-5 border border-slate-200 rounded-2xl text-lg">
                </div>
                <div>
                    <label class="block text-sm text-slate-500 mb-2">Factor Rate</label>
                    <input id="factorRate" type="number" value="1.18" step="0.01" oninput="update()" class="w-full px-6 py-5 border border-slate-200 rounded-2xl text-lg">
                </div>
            </div>

            <div>
                <label class="block text-sm text-slate-500 mb-2">Term (months)</label>
                <input id="term" type="number" value="12" oninput="update()" class="w-full px-6 py-5 border border-slate-200 rounded-2xl text-lg">
            </div>

            <button onclick="generatePrivateLink()" 
                    class="w-full py-7 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold text-xl rounded-3xl">
                Generate Private Merchant Link
            </button>
        </div>

        <!-- PREVIEW -->
        <div class="lg:col-span-8">
            <div id="preview" class="merchant-card bg-white rounded-3xl p-10"></div>
        </div>
    </div>
</div>

<script>
let currentAmt = 75000;

function update() {
    const biz = document.getElementById('bizName').value || "Business";
    const max = parseInt(document.getElementById('maxAmt').value) || 100000;
    const factor = parseFloat(document.getElementById('factorRate').value) || 1.18;
    const term = parseInt(document.getElementById('term').value) || 12;

    currentAmt = Math.round(max * 0.75);

    const total = Math.round(currentAmt * factor);
    const daily = Math.round(total / (term * 22));

    document.getElementById('preview').innerHTML = `
        <div class="flex justify-between">
            <div>
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 bg-emerald-600 text-white rounded-3xl flex items-center justify-center text-4xl font-bold logo-font">C</div>
                    <div class="text-3xl font-semibold logo-font">Clear Capital</div>
                </div>
                <div class="mt-10 text-4xl font-semibold">${biz}</div>
            </div>
            <div class="bg-emerald-100 text-emerald-700 px-8 py-3 rounded-3xl font-semibold">PRE-APPROVED</div>
        </div>

        <div class="mt-12">
            <div class="text-7xl font-bold logo-font text-slate-900">$${currentAmt.toLocaleString()}</div>
            <div class="text-slate-500">75% of Max Approval • Slider below</div>
            <input type="range" min="5000" max="${max}" value="${currentAmt}" step="1000" 
                   oninput="currentAmt = parseInt(this.value); update()" 
                   class="w-full mt-6 accent-emerald-500">
        </div>

        <div class="grid grid-cols-3 gap-8 mt-12">
            <div class="text-center">
                <div class="text-5xl font-semibold">$${daily}</div>
                <div class="text-xs text-slate-500 mt-2">DAILY PAYMENT</div>
            </div>
            <div class="text-center">
                <div class="text-5xl font-semibold">$${total.toLocaleString()}</div>
                <div class="text-xs text-slate-500 mt-2">TOTAL PAYBACK</div>
            </div>
            <div class="text-center">
                <div class="text-5xl font-semibold">${factor.toFixed(2)}×</div>
                <div class="text-xs text-slate-500 mt-2">FACTOR RATE</div>
            </div>
        </div>
    `;
}

function generatePrivateLink() {
    const params = new URLSearchParams({
        merchant: 'true',
        biz: document.getElementById('bizName').value || 'Business',
        max: document.getElementById('maxAmt').value,
        factor: document.getElementById('factorRate').value,
        term: document.getElementById('term').value
    });
    const link = `${window.location.origin}${window.location.pathname}?${params.toString()}`;
    navigator.clipboard.writeText(link);
    alert('✅ Merchant Link Copied!\n\nSend this to the merchant.');
}

update();
</script>
</body>
</html>
