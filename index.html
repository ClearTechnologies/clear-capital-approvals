<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Clear Capital • Platform</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0a1729;--navy2:#0f2040;--navy3:#162035;
  --em:#00d4aa;--em2:#00b891;--em3:rgba(0,212,170,.12);
  --amber:#f59e0b;--amber2:#d97706;
  --slate1:#f1f5f9;--slate2:#e2e8f0;--slate3:#94a3b8;
  --slate4:#64748b;--slate5:#334155;--slate6:#1e293b;
  --white:#fff;--r:14px;--r2:20px;
}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--navy);color:var(--white);display:flex;flex-direction:column}

/* All your original CSS remains unchanged except minor upload improvements */
.upload-zone{border:2px dashed rgba(255,255,255,.12);border-radius:12px;padding:18px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:12px}
.upload-zone:hover{border-color:rgba(0,212,170,.4);background:rgba(0,212,170,.04)}
.upload-zone.done{border-color:var(--em);background:rgba(0,212,170,.06)}
.upload-zone-icon{font-size:32px;margin-bottom:8px}
.upload-zone-label{font-size:12px;color:var(--slate3)}
.upload-zone-label.ok{color:var(--em);font-weight:600}
.upload-zone-hint{font-size:10px;color:var(--slate4);margin-top:3px}
</style>
</head>
<body>

<!-- [Your full original topbar, builder, preview panels, and most of the modals remain exactly the same] -->

<!-- Updated PDF-friendly upload fields in Confirm Modal -->
<label class="form-label">DRIVER'S LICENSE <span style="color:var(--em)">*</span></label>
<div class="upload-zone" id="dlZone" onclick="document.getElementById('dlFile').click()">
  <div class="upload-zone-icon">🪪</div>
  <div class="upload-zone-label" id="dlLabel">Click to upload Driver's License (PDF or Image)</div>
  <div class="upload-zone-hint">JPG, PNG, or PDF • Max 10MB</div>
</div>
<input id="dlFile" name="driver_license" type="file" accept="image/*,.pdf" style="display:none" required onchange="fileChosen(this,'dlLabel','dlZone')">

<label class="form-label">VOIDED CHECK <span style="color:var(--em)">*</span></label>
<div class="upload-zone" id="checkZone" onclick="document.getElementById('checkFile').click()">
  <div class="upload-zone-icon">🏦</div>
  <div class="upload-zone-label" id="checkLabel">Click to upload Voided Check (PDF or Image)</div>
  <div class="upload-zone-hint">JPG, PNG, or PDF • Business bank account check marked VOID</div>
</div>
<input id="checkFile" name="voided_check" type="file" accept="image/*,.pdf" style="display:none" required onchange="fileChosen(this,'checkLabel','checkZone')">

<!-- Rest of your modals (sendEmailModal, changesModal, etc.) remain unchanged -->

<div id="toast"></div>

<script>
/* Your original shared state and all functions remain the same */

/* IMPROVED fileChosen function - ONLY CHANGE FOR PDF SUPPORT */
function fileChosen(input, labelId, zoneId) {
  const file = input.files[0];
  if (!file) return;
  const label = gid(labelId);
  const zone = gid(zoneId);
  const isPDF = file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf');
  const icon = isPDF ? '📕' : '📸';
  label.innerHTML = `${icon} ${file.name}`;
  label.classList.add('ok');
  zone.classList.add('done');
  if (file.size > 10 * 1024 * 1024) {
    label.innerHTML += ` <small style="color:#f59e0b">(Large file)</small>`;
  }
}

/* All your other original JavaScript (renderPortalPreview, renderEmailPreview, openSendEmailModal, fsSubmit, etc.) stay exactly the same */

gid('sendEmailForm').addEventListener('submit',e=>fsSubmit(e,'sendEmailForm','emailSendWrap','emailSendSuccess','emailSendError','emailSendBtn'));
gid('confirmForm').addEventListener('submit',e=>fsSubmit(e,'confirmForm','confirmFormWrap','confirmSuccess','confirmError','confirmBtn'));
gid('changesForm').addEventListener('submit',e=>fsSubmit(e,'changesForm','changesFormWrap','changesSuccess','changesError','changesBtn'));

/* BOOT */
toggleRefiFields();
renderPortalPreview();
</script>
</body>
</html>
