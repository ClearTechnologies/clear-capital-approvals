<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clear Capital • Approved</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #0a1729; --emerald: #00d4aa; }
        body { font-family: 'Inter', system-ui, sans-serif; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>
<body class="bg-slate-50">

<div class="min-h-screen bg-slate-50">
    <div class="max-w-7xl mx-auto p-8">
        <div class="text-center mb-12">
            <div class="inline-flex items-center gap-3 bg-white px-6 py-3 rounded-3xl shadow">
                <div class="w-10 h-10 bg-emerald-600 text-white rounded-2xl flex items-center justify-center text-3xl font-bold logo-font">C</div>
                <div class="text-3xl font-semibold logo-font">Clear Capital</div>
            </div>
        </div>

        <div class="max-w-2xl mx-auto bg-white rounded-3xl shadow-xl p-10">
            <h1 class="text-4xl font-semibold text-center mb-8 logo-font">Deal Builder</h1>
            
            <div class="space-y-8">
                <input id="bizName" value="Sunrise Grill & Bar" oninput="update()" placeholder="Business Name" 
                       class="w-full px-6 py-5 text-xl border border-slate-200 rounded-2xl focus:border-emerald-500">

                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="text-sm text-slate-500">Max Approval</label>
                        <input id="maxAmt" type="number" value="100000" oninput="update()" class="w-full px-6 py-5 text-xl border border-slate-200 rounded-2xl">
                    </div>
                    <div>
                        <label class="text-sm text-slate-500">Factor Rate</label>
                        <input id="factorRate" type="number" value="1.18" step="0.01" oninput="update()" class="w-full px-6 py-5 text-xl border border-slate-200 rounded-2xl">
                    </div>
                </div>

                <button onclick="generatePrivateLink()" 
                        class="w-full py-6 bg-emerald-600 hover:bg-emerald-700 text-white text-xl font-semibold rounded-3xl">
                    Generate Private Merchant Link
                </button>
            </div>

            <div id="preview" class="mt-12 bg-slate-50 rounded-3xl p-8 text-center"></div>
        </div>
    </div>
</div>

<script>
function update() {
    const biz = document.getElementById('bizName').value || "Business";
    const max = parseInt(document.getElementById('maxAmt').value) || 100000;
    const factor = parseFloat(document.getElementById('factorRate').value) || 1.18;
    const amt = Math.round(max * 0.75);

    document.getElementById('preview').innerHTML = `
        <div class="text-6xl font-bold text-slate-900 mb-2">$${amt.toLocaleString()}</div>
        <div class="text-slate-500">75% of Max Approval</div>
        <div class="mt-8 text-sm text-emerald-600 font-medium">Factor Rate: ${factor.toFixed(2)}×</div>
    `;
}

function generatePrivateLink() {
    const params = new URLSearchParams({
        merchant: 'true',
        biz: document.getElementById('bizName').value,
        max: document.getElementById('maxAmt').value,
        factor: document.getElementById('factorRate').value
    });
    const link = window.location.origin + window.location.pathname + '?' + params.toString();
    navigator.clipboard.writeText(link);
    alert('✅ Merchant Link Copied!\n\n' + link);
}

update();
</script>
</body>
</html>
