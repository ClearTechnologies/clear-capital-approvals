<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clear Capital • Approved</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #0a1729; --emerald: #00d4aa; }
        body { font-family: 'Inter', system-ui, sans-serif; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">
    <div class="max-w-2xl w-full bg-white rounded-3xl shadow-2xl p-10">
        <div class="flex justify-between items-center mb-10">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-[#0a1729] text-white rounded-3xl flex items-center justify-center text-4xl font-bold logo-font">C</div>
                <div class="text-3xl font-semibold logo-font">Clear Capital</div>
            </div>
            <div class="bg-emerald-100 text-emerald-700 px-6 py-2 rounded-3xl font-semibold">PRE-APPROVED</div>
        </div>

        <div id="bizNameDisplay" class="text-4xl font-semibold text-[#0a1729]"></div>

        <!-- Funding Amount -->
        <div class="mt-10">
            <label class="block text-sm text-slate-500 mb-3">Funding Amount</label>
            <input id="amtInput" type="text" 
                   oninput="formatAsYouType(this); updateCalc()" 
                   onblur="formatAmount(this)"
                   class="w-full px-8 py-8 text-6xl font-bold border border-slate-200 rounded-3xl text-center">
            <input type="range" id="amtSlider" min="5000" step="1000"
                   oninput="document.getElementById('amtInput').value = Number(this.value).toLocaleString('en-US'); updateCalc()"
                   class="w-full mt-6 accent-[#0a1729]">
        </div>

        <!-- Payment Frequency -->
        <div class="mt-8">
            <label class="block text-sm text-slate-500 mb-3">Payment Frequency</label>
            <div id="frequencyButtons" class="flex flex-wrap gap-3"></div>
        </div>

        <!-- Main Calculations -->
        <div class="mt-12 grid grid-cols-3 gap-8 text-center" id="mainCalc"></div>

        <!-- Early Payoff -->
        <div class="mt-12 bg-emerald-50 border border-emerald-100 rounded-3xl p-8">
            <div class="font-semibold text-emerald-800 mb-6">Early Payoff Options</div>
            <div class="grid grid-cols-3 gap-6 text-center" id="earlyPayoff"></div>
        </div>

        <div class="mt-16 flex gap-4">
            <button onclick="sendInterest()" class="flex-1 py-8 bg-[#0a1729] text-white font-semibold text-2xl rounded-3xl">I'm Interested →</button>
            <button onclick="sendChangeRequest()" class="flex-1 py-8 border-2 border-slate-300 font-semibold text-2xl rounded-3xl">Request Change</button>
        </div>
    </div>

    <script>
        // Helper: Format with commas + $
        function fmt(n) {
            return '$' + Math.round(n).toLocaleString('en-US');
        }

        function formatAsYouType(input) {
            let val = input.value.replace(/[^0-9]/g, '');
            if (val) input.value = parseInt(val).toLocaleString('en-US');
        }

        function formatAmount(input) {
            let val = parseInt(input.value.replace(/,/g, '')) || 5000;
            input.value = val.toLocaleString('en-US');
            updateCalc();
        }

        // Read URL parameters
        const params = new URLSearchParams(window.location.search);
        const bizName = decodeURIComponent(params.get('biz') || 'Your Business');
        let maxAmount = parseInt(params.get('max')) || 100000;
        const factor = parseFloat(params.get('factor')) || 1.18;
        const maxTerm = parseInt(params.get('term')) || 12;
        const allowedFreqs = params.get('freq') ? params.get('freq').split(',') : ['daily'];

        // Determine available frequencies for merchant
        function getAvailableFrequencies() {
            let options = new Set(['daily']);
            if (allowedFreqs.includes('weekly') || allowedFreqs.includes('biweekly') || allowedFreqs.includes('monthly')) {
                options.add('weekly');
            }
            if (allowedFreqs.includes('biweekly') || allowedFreqs.includes('monthly')) {
                options.add('biweekly');
            }
            if (allowedFreqs.includes('monthly')) {
                options.add('monthly');
            }
            return Array.from(options);
        }

        function updateCalc() {
            let amtStr = document.getElementById('amtInput').value.replace(/,/g, '');
            let amt = parseInt(amtStr) || 5000;
            amt = Math.min(Math.max(amt, 5000), maxAmount);

            const total = Math.round(amt * factor);
            const daily = Math.round(total / (maxTerm * 22));   // business days

            document.getElementById('mainCalc').innerHTML = `
                <div><div class="text-5xl font-semibold">${fmt(daily)}</div><div class="text-xs text-slate-500">PAYMENT</div></div>
                <div><div class="text-5xl font-semibold">${fmt(total)}</div><div class="text-xs text-slate-500">TOTAL PAYBACK</div></div>
                <div><div class="text-5xl font-semibold">${factor.toFixed(2)}×</div><div class="text-xs text-slate-500">FACTOR RATE</div></div>
            `;

            // Early payoff (simple example - you can enhance later)
            const remaining = total - amt;
            document.getElementById('earlyPayoff').innerHTML = `
                <div class="bg-white rounded-2xl p-5"><div class="text-emerald-600 font-semibold">30 Days</div><div class="text-3xl font-bold text-emerald-700">${fmt(total - Math.round(remaining * 0.5))}</div><div class="text-xs text-slate-500">Lower Factor</div></div>
                <div class="bg-white rounded-2xl p-5"><div class="text-emerald-600 font-semibold">60 Days</div><div class="text-3xl font-bold text-emerald-700">${fmt(total - Math.round(remaining * 0.3))}</div><div class="text-xs text-slate-500">Lower Factor</div></div>
                <div class="bg-white rounded-2xl p-5"><div class="text-emerald-600 font-semibold">90 Days</div><div class="text-3xl font-bold text-emerald-700">${fmt(total - Math.round(remaining * 0.1))}</div><div class="text-xs text-slate-500">Lower Factor</div></div>
            `;
        }

        function renderFrequencyButtons() {
            const container = document.getElementById('frequencyButtons');
            const frequencies = getAvailableFrequencies();
            const labels = { daily: "Daily", weekly: "Weekly", biweekly: "Bi-weekly", monthly: "Monthly" };

            container.innerHTML = frequencies.map(freq => `
                <button onclick="selectFrequency(this)" data-freq="${freq}"
                        class="freq-btn px-6 py-3 bg-white border-2 border-slate-200 rounded-2xl font-medium hover:border-emerald-500 transition-colors">
                    ${labels[freq]}
                </button>
            `).join('');

            // Select first one by default
            if (container.children.length > 0) {
                container.children[0].classList.add('!border-emerald-500', 'bg-emerald-50');
            }
        }

        function selectFrequency(btn) {
            document.querySelectorAll('.freq-btn').forEach(b => {
                b.classList.remove('!border-emerald-500', 'bg-emerald-50');
            });
            btn.classList.add('!border-emerald-500', 'bg-emerald-50');
            updateCalc();
        }

        function sendInterest() {
            alert("Thank you! A Clear Capital specialist will contact you shortly.");
        }
        function sendChangeRequest() {
            alert("Change request received. We'll get back to you soon.");
        }

        // Initialize
        window.onload = () => {
            document.getElementById('bizNameDisplay').textContent = bizName;

            // Set slider max
            const slider = document.getElementById('amtSlider');
            slider.max = maxAmount;

            // Initial amount = 75% of max
            const initialAmount = Math.round(maxAmount * 0.75);
            document.getElementById('amtInput').value = initialAmount.toLocaleString('en-US');
            slider.value = initialAmount;

            renderFrequencyButtons();
            updateCalc();
        };
    </script>
</body>
</html>
